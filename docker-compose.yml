version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: stok-saas-postgres
    environment:
      POSTGRES_USER: stok_user
      POSTGRES_PASSWORD: stok_password
      POSTGRES_DB: stok_dev
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stok_user -d stok_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stok-network

  redis:
    image: redis:7-alpine
    container_name: stok-saas-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stok-network

volumes:
  postgres_data:
  redis_data:

networks:
  stok-network:
    driver: bridge
